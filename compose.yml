services:
  jenkins:
    container_name: jenkins
    image: docker.io/jenkins/jenkins:lts
    user: "1003:1003"
    ports:
      - 0.0.0.0:8081:${JENKINS_PORT_INTERNAL}
    volumes:
      - ./service/jenkins_home:/var/jenkins_home
    environment:
      - JENKINS_OPTS="--httpPort=${JENKINS_PORT_INTERNAL}"
    restart: always
    networks:
      - justicier_net
    healthcheck:
      test: curl -fsSL http://localhost:${JENKINS_PORT_INTERNAL}/login || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 5s


  agent:
    build:
      context: .
      dockerfile: agent.Dockerfile
    container_name: agent
    expose:
      - ${AGENT_PORT_INTERNAL}
    volumes:
      - type: bind
        source: ./service/jenkins_agent_keys
        target: /home/jenkins/.ssh
        read_only: false
    environment:
      - JENKINS_AGENT_SSH_PUBKEY=${JENKINS_AGENT_SSH_PUBKEY}
    restart: always
    networks:
      - justicier_net
    healthcheck:
      test: bash -c 'exec 3<>/dev/tcp/localhost/22'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s





